<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Screening Insights — Studio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/vue/2.7.16/vue.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/vue-router/3.6.5/vue-router.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/ag-grid-community@36.0.1/dist/ag-grid-community.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
  <style>
    :root {
      --plum: #2b1f36;
      --coral: #ff6b5f;
      --teal: #3fae87;
      --amber: #f5a623;
      --cream: #fdfaf6;
      --card: #ffffff;
      --text: #2b2320;
      --muted: #8a7f78;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: 'Inter', -apple-system, sans-serif;
      background: var(--cream);
      color: var(--text);
    }
    h1, h2, .brand { font-family: 'Poppins', sans-serif; }

    /* Top bar with hamburger */
    .topbar {
      display: flex;
      align-items: center;
      background: var(--cream);
      border-bottom: 1px solid #eee3d8;
      padding: 0 20px;
      height: 64px;
    }
    .hamburger {
      background: var(--plum);
      border: none;
      border-radius: 10px;
      cursor: pointer;
      width: 40px;
      height: 40px;
      margin-right: 16px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 4px;
    }
    .hamburger span {
      display: block;
      width: 18px;
      height: 2px;
      background: #fff;
      border-radius: 2px;
    }
    .topbar .brand {
      font-weight: 700;
      font-size: 18px;
      color: var(--plum);
    }

    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(43, 31, 54, 0.4);
      z-index: 10;
    }

    .sidebar {
      position: fixed;
      top: 0;
      left: 0;
      height: 100%;
      width: 260px;
      background: var(--plum);
      z-index: 20;
      transform: translateX(-100%);
      transition: transform 0.28s ease;
      display: flex;
      flex-direction: column;
      padding-top: 20px;
    }
    .sidebar.open { transform: translateX(0); }
    .sidebar-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0 22px 18px;
      margin-bottom: 8px;
    }
    .sidebar-header .brand { color: #fff; font-size: 16px; }
    .sidebar-close {
      background: none; border: none; color: #cbb9d6;
      font-size: 20px; cursor: pointer; padding: 4px;
    }
    .sidebar a {
      color: #cbb9d6;
      text-decoration: none;
      padding: 11px 22px;
      font-size: 14px;
      margin: 2px 10px;
      border-radius: 8px;
      font-weight: 500;
    }
    .sidebar a.router-link-exact-active {
      color: #fff;
      background: rgba(255,255,255,0.08);
    }
    .sidebar a:hover { color: #fff; }

    .fade-enter-active, .fade-leave-active { transition: opacity 0.25s ease; }
    .fade-enter, .fade-leave-to { opacity: 0; }

    .page {
      max-width: 1180px;
      margin: 28px auto;
      padding: 0 24px 48px;
    }
    .page h1 {
      font-size: 25px;
      margin: 0 0 4px;
      color: var(--plum);
    }
    .page .subtitle {
      color: var(--muted);
      font-size: 14px;
      margin: 0 0 24px;
    }

    /* Tinted KPI tiles */
    .tiles {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(190px, 1fr));
      gap: 16px;
      margin-bottom: 28px;
    }
    .tile {
      border-radius: 16px;
      padding: 20px 22px;
      box-shadow: 0 4px 14px rgba(43, 31, 54, 0.06);
    }
    .tile:nth-child(1) { background: #fff0ee; }
    .tile:nth-child(2) { background: #eaf7f1; }
    .tile:nth-child(3) { background: #fff4e2; }
    .tile:nth-child(4) { background: #f1ecf7; }
    .tile:nth-child(5) { background: #ffffff; border: 1px solid #eee3d8; }
    .tile .label {
      font-size: 12px;
      color: var(--muted);
      font-weight: 600;
      margin-bottom: 8px;
    }
    .tile .value {
      font-size: 26px;
      font-weight: 700;
      color: var(--plum);
      font-family: 'Poppins', sans-serif;
    }

    .card {
      background: var(--card);
      border-radius: 16px;
      padding: 24px;
      box-shadow: 0 4px 14px rgba(43, 31, 54, 0.06);
      margin-bottom: 20px;
      border: 1px solid #f2ece3;
    }
    .card h2 {
      font-size: 15px;
      color: var(--plum);
      margin: 0 0 16px;
      font-weight: 600;
    }
    .grid-2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
    }
    @media (max-width: 800px) {
      .grid-2 { grid-template-columns: 1fr; }
    }
    .chart-wrap { position: relative; height: 280px; }
    .chart-wrap.tall { height: 360px; }
    .grid-wrap { height: 480px; width: 100%; }

    .loading {
      color: var(--muted);
      font-size: 13px;
      padding: 24px 0;
      text-align: center;
    }
  </style>
</head>
<body>
  <div id="app">
    <div class="topbar">
      <button class="hamburger" @click="menuOpen = true" aria-label="Open menu">
        <span></span><span></span><span></span>
      </button>
      <span class="brand">Screening Insights — Studio</span>
    </div>

    <transition name="fade">
      <div class="overlay" v-if="menuOpen" @click="menuOpen = false"></div>
    </transition>

    <nav class="sidebar" :class="{ open: menuOpen }">
      <div class="sidebar-header">
        <span class="brand">Menu</span>
        <button class="sidebar-close" @click="menuOpen = false" aria-label="Close menu">&times;</button>
      </div>
      <router-link to="/" @click.native="menuOpen = false">Landing</router-link>
      <router-link to="/overview" @click.native="menuOpen = false">Overview</router-link>
      <router-link to="/geography" @click.native="menuOpen = false">Geography</router-link>
      <router-link to="/demographics" @click.native="menuOpen = false">Demographics</router-link>
      <router-link to="/substances" @click.native="menuOpen = false">Substances</router-link>
      <router-link to="/risk" @click.native="menuOpen = false">Risk Profiles</router-link>
      <router-link to="/trends" @click.native="menuOpen = false">Trends</router-link>
      <router-link to="/comparative" @click.native="menuOpen = false">Comparative Analytics</router-link>
      <router-link to="/reports" @click.native="menuOpen = false">Reports</router-link>
      <router-link to="/explorer" @click.native="menuOpen = false">Advanced Explorer</router-link>
    </nav>

    <div class="page">
      <router-view></router-view>
    </div>
  </div>

  <script src="./charts.js"></script>
  <script src="./app.js"></script>
</body>
</html>
