<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Screening Insights</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/vue/2.7.16/vue.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/vue-router/3.6.5/vue-router.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/ag-grid-community@36.0.1/dist/ag-grid-community.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
  <style>
    :root {
      --navy: #0f2a4a;
      --navy-light: #1b3f6b;
      --teal: #14b8a6;
      --bg: #f5f7fa;
      --card: #ffffff;
      --text: #1f2937;
      --muted: #6b7280;
      --border: #e5e9ef;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    .navbar {
      display: flex;
      align-items: center;
      background: var(--navy);
      padding: 0 24px;
      height: 60px;
      flex-wrap: wrap;
    }
    .navbar .brand {
      color: #fff;
      font-weight: 700;
      font-size: 17px;
      margin-right: 32px;
      white-space: nowrap;
      letter-spacing: 0.2px;
    }
    .navbar a {
      color: #a9b8cc;
      text-decoration: none;
      padding: 0 12px;
      line-height: 60px;
      font-size: 13.5px;
      font-weight: 500;
      white-space: nowrap;
    }
    .navbar a.router-link-exact-active {
      color: #fff;
      box-shadow: inset 0 -3px 0 var(--teal);
    }
    .navbar a:hover { color: #fff; }

    .page {
      max-width: 1180px;
      margin: 32px auto;
      padding: 0 24px 48px;
    }
    .page h1 {
      font-size: 24px;
      margin: 0 0 4px;
      color: var(--navy);
    }
    .page .subtitle {
      color: var(--muted);
      font-size: 14px;
      margin: 0 0 24px;
    }

    /* KPI tiles */
    .tiles {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(190px, 1fr));
      gap: 16px;
      margin-bottom: 28px;
    }
    .tile {
      background: var(--card);
      border-radius: 10px;
      border-left: 4px solid var(--teal);
      padding: 18px 20px;
      box-shadow: 0 1px 3px rgba(15, 42, 74, 0.08);
    }
    .tile .label {
      font-size: 12.5px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.4px;
      margin-bottom: 6px;
    }
    .tile .value {
      font-size: 28px;
      font-weight: 700;
      color: var(--navy);
    }

    /* Generic content cards */
    .card {
      background: var(--card);
      border-radius: 10px;
      padding: 24px;
      box-shadow: 0 1px 3px rgba(15, 42, 74, 0.08);
      margin-bottom: 20px;
    }
    .card h2 {
      font-size: 15px;
      color: var(--navy);
      margin: 0 0 16px;
      font-weight: 600;
    }
    .grid-2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
    }
    @media (max-width: 800px) {
      .grid-2 { grid-template-columns: 1fr; }
    }
    .chart-wrap { position: relative; height: 280px; }
    .chart-wrap.tall { height: 360px; }
    .grid-wrap { height: 480px; width: 100%; }

    .loading {
      color: var(--muted);
      font-size: 13px;
      padding: 24px 0;
      text-align: center;
    }
  </style>
</head>
<body>
  <div id="app">
    <nav class="navbar">
      <span class="brand">Screening Insights</span>
      <router-link to="/">Landing</router-link>
      <router-link to="/overview">Overview</router-link>
      <router-link to="/geography">Geography</router-link>
      <router-link to="/demographics">Demographics</router-link>
      <router-link to="/substances">Substances</router-link>
      <router-link to="/risk">Risk Profiles</router-link>
      <router-link to="/trends">Trends</router-link>
      <router-link to="/comparative">Comparative Analytics</router-link>
      <router-link to="/reports">Reports</router-link>
      <router-link to="/explorer">Advanced Explorer</router-link>
    </nav>
    <div class="page">
      <router-view></router-view>
    </div>
  </div>

  <script src="./charts.js"></script>
  <script src="./app.js"></script>
</body>
</html>
