<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Global Strategic Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">

  <script src="https://cdnjs.cloudflare.com/ajax/libs/vue/2.7.16/vue.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/vue-router/3.6.5/vue-router.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/ag-grid-community@36.0.1/dist/ag-grid-community.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
  <script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/d3@7"></script>
  <script src="https://cdn.jsdelivr.net/npm/d3-sankey@0.12.3/dist/d3-sankey.min.js"></script>

  <style>
    :root {
      --ink: #17171a;
      --muted: #6b7280;
      --accent: #4338ca;
      --accent-soft: #eef2ff;
      --bg: #ffffff;
      --border: #e5e7eb;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: 'IBM Plex Sans', -apple-system, sans-serif;
      background: var(--bg);
      color: var(--ink);
    }

    .sidebar {
      position: fixed;
      top: 0;
      left: 0;
      width: 224px;
      height: 100%;
      border-right: 1px solid var(--border);
      background: #fff;
      padding: 28px 0;
      overflow-y: auto;
    }
    .sidebar .brand {
      font-weight: 700;
      font-size: 15px;
      padding: 0 24px 24px;
      letter-spacing: 0.2px;
    }
    .sidebar .brand span {
      display: block;
      font-weight: 400;
      color: var(--muted);
      font-size: 11.5px;
      text-transform: uppercase;
      letter-spacing: 0.6px;
      margin-top: 4px;
    }
    .sidebar a {
      display: block;
      color: var(--muted);
      text-decoration: none;
      font-size: 13.5px;
      font-weight: 500;
      padding: 10px 24px;
      border-left: 3px solid transparent;
    }
    .sidebar a.router-link-exact-active {
      color: var(--ink);
      border-left-color: var(--accent);
      background: var(--accent-soft);
    }
    .sidebar a:hover { color: var(--ink); }

    @media (max-width: 720px) {
      .sidebar { width: 64px; }
      .sidebar .brand { display: none; }
      .sidebar a { padding: 12px; font-size: 0; text-align: center; }
      .sidebar a::first-letter { font-size: 13px; }
      .main { margin-left: 64px !important; }
    }

    .main {
      margin-left: 224px;
      padding: 36px 40px 60px;
      max-width: 1180px;
    }
    .main h1 {
      font-size: 22px;
      margin: 0 0 4px;
      font-weight: 700;
    }
    .main .subtitle {
      color: var(--muted);
      font-size: 13.5px;
      margin: 0 0 24px;
    }

    .tiles {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 16px;
      margin-bottom: 28px;
    }
    .tile {
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 20px 22px;
    }
    .tile:last-child { grid-column: 1 / -1; }
    @media (max-width: 640px) { .tiles { grid-template-columns: 1fr; } }
    .tile .label {
      font-size: 11.5px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 8px;
    }
    .tile .value {
      font-size: 26px;
      font-weight: 700;
    }

    .card {
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 22px;
      margin-bottom: 18px;
    }
    .card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
      flex-wrap: wrap;
      gap: 10px;
    }
    .card-header h2 { margin: 0; font-size: 14.5px; font-weight: 600; }
    .card-note { color: var(--muted); font-size: 12px; margin: -8px 0 16px; }

    .grid-2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 18px;
    }
    @media (max-width: 800px) { .grid-2 { grid-template-columns: 1fr; } }

    .chart-wrap { position: relative; height: 280px; }
    .chart-wrap.tall { height: 360px; }
    .chart-wrap.compact { height: 100%; overflow: hidden; }
    .grid-wrap { height: 480px; width: 100%; }
    .map-wrap { height: 420px; width: 100%; border-radius: 6px; overflow: hidden; }
    .sankey-wrap { width: 100%; overflow-x: auto; }

    .loading { color: var(--muted); font-size: 13px; padding: 24px 0; text-align: center; }

    .export-bar { display: flex; gap: 8px; }
    .export-bar button {
      background: #fff;
      color: var(--ink);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 5px 11px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
    }
    .export-bar button:hover {
      background: var(--accent);
      color: #fff;
      border-color: var(--accent);
    }

    table.plain {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }
    table.plain th, table.plain td {
      text-align: left;
      padding: 9px 10px;
      border-bottom: 1px solid var(--border);
    }
    table.plain th {
      color: var(--muted);
      font-weight: 600;
      font-size: 11.5px;
      text-transform: uppercase;
      letter-spacing: 0.3px;
    }
    .pill {
      display: inline-block;
      padding: 2px 9px;
      border-radius: 20px;
      font-size: 11.5px;
      font-weight: 600;
      background: #fef2f2;
      color: #b91c1c;
    }
  </style>
</head>
<body>
  <div id="app">
    <nav class="sidebar">
      <div class="brand">Global Strategic Dashboard<span>ISSUP Oversight View</span></div>
      <router-link to="/">Overview</router-link>
      <router-link to="/map">Global Map</router-link>
      <router-link to="/substance-trends">Substance Trends</router-link>
      <router-link to="/demographics">Demographics</router-link>
      <router-link to="/cohorts">Cohort Analytics</router-link>
      <router-link to="/regional-concerns">Regional Concerns</router-link>
      <router-link to="/reports">Reports</router-link>
      <router-link to="/explorer">Advanced Explorer</router-link>
    </nav>
    <div class="main">
      <router-view></router-view>
    </div>
  </div>

  <script src="./charts.js"></script>
  <script src="./app.js"></script>
</body>
</html>
